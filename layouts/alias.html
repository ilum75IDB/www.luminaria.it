<!DOCTYPE html>
<html>
<head>
  <title>Ivan Luminaria</title>
  <link rel="canonical" href="{{ .Permalink }}"/>
  <meta name="robots" content="noindex">
  <meta charset="utf-8"/>
  <meta http-equiv="refresh" content="0; url={{ .Permalink }}"/>
  {{/* OG tags for root URL shared on social */}}
  <meta property="og:title" content="Ivan Luminaria" />
  <meta property="og:description" content="Blog tecnico su Oracle, PostgreSQL, MySQL, data warehouse e project management. Articoli pratici, storie di progetto reali e lezioni imparate sul campo in ~30 anni di consulenza." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ .Site.BaseURL }}" />
  <meta property="og:site_name" content="Ivan Luminaria" />
  <meta property="article:author" content="Ivan Luminaria" />
  {{- $latestPost := (where .Site.RegularPages "Section" "posts" | first 1) }}
  {{- with index $latestPost 0 }}
  <meta property="article:published_time" content="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}" />
  {{- end }}
  <meta property="og:image" content="{{ .Site.BaseURL }}img/og-homepage.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ivan Luminaria" />
  <meta name="twitter:description" content="Blog tecnico su Oracle, PostgreSQL, MySQL, data warehouse e project management. Articoli pratici, storie di progetto reali e lezioni imparate sul campo in ~30 anni di consulenza." />
  <meta name="twitter:image" content="{{ .Site.BaseURL }}img/og-homepage.jpg" />
</head>
</html>
